<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Persona — OpenRP AI</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.12), transparent 30%),
          radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.12), transparent 28%),
          #020617;
      }

      .container {
        width: min(600px, 100%);
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 1.5rem;
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 2.5vw, 2.5rem);
      }

      p {
        margin: 0 0 1.5rem;
        color: #94a3b8;
        line-height: 1.6;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #cbd5e1;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 0.85rem;
        background: rgba(15, 23, 42, 0.9);
        color: #e2e8f0;
        padding: 0.95rem 1rem;
        font: inherit;
        margin-bottom: 1rem;
      }

      textarea {
        min-height: 140px;
        resize: vertical;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 0.95rem;
        padding: 1rem 1.25rem;
        font: inherit;
        font-weight: 700;
        color: #020617;
        background: #38bdf8;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        background: #0ea5e9;
      }

      .hint {
        margin: 1rem 0 0;
        color: #94a3b8;
        font-size: 0.95rem;
      }

      .error {
        margin-top: 1rem;
        color: #fda4af;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Cadastrar sua persona</h1>
      <p>Antes de continuar, informe o nome e a descrição do seu personagem principal na aplicação.</p>

      <form id="persona-form">
        <label for="name">Nome</label>
        <input id="name" name="name" type="text" placeholder="Ex: Arya Stark" required />

        <label for="description">Descrição</label>
        <textarea id="description" name="description" placeholder="Descreva a persona..." required></textarea>

        <label for="avatar_url">URL do Avatar (opcional)</label>
        <input id="avatar_url" name="avatar_url" type="url" placeholder="https://..." />

        <button type="submit">Salvar persona</button>
        <div id="message" class="error" role="status"></div>
      </form>

      <p class="hint">Após salvar, você será redirecionado para a página principal.</p>
    </div>

    <script>
      const form = document.getElementById('persona-form');
      const message = document.getElementById('message');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        message.textContent = '';

        const data = {
          name: document.getElementById('name').value.trim(),
          description: document.getElementById('description').value.trim(),
          avatar_url: document.getElementById('avatar_url').value.trim() || null,
        };

        if (!data.name || !data.description) {
          message.textContent = 'Por favor, preencha o nome e a descrição.';
          return;
        }

        try {
          const response = await fetch('/api/persona', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });

          const result = await response.json();
          if (!response.ok || !result.ok) {
            throw new Error(result.message || 'Falha ao salvar persona');
          }

          window.location.href = '/';
        } catch (err) {
          console.error(err);
          message.textContent = err.message || 'Erro ao salvar persona. Tente novamente.';
        }
      });
    </script>
  </body>
</html>
