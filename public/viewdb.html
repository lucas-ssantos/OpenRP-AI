<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banco de Dados — OpenRP AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/sidebar.css" />
    <link rel="stylesheet" href="/assets/css/viewdb.css" />
  </head>
  <body>
    <div class="d-flex vdb-outer">
      <div id="sidebar-root" class="flex-shrink-0"></div>

      <div class="vdb-page flex-grow-1">

        <!-- Left: conversation list -->
        <aside class="vdb-convs-panel">
          <div class="vdb-panel-header">
            <span class="fw-semibold">Conversas</span>
            <span id="conv-count" class="badge-count">0</span>
          </div>
          <div id="conv-list" class="vdb-conv-list">
            <p class="text-secondary small p-3 mb-0">
              <i class="bi bi-hourglass-split me-1"></i>Carregando…
            </p>
          </div>
        </aside>

        <!-- Right: conversation detail -->
        <main class="vdb-detail-panel">

          <!-- Empty state -->
          <div id="detail-empty" class="vdb-empty">
            <i class="bi bi-chat-square-text vdb-empty-icon"></i>
            <p class="mb-0">Selecione uma conversa para ver os detalhes</p>
          </div>

          <!-- Loaded detail -->
          <div id="detail-content" class="vdb-detail-content d-none">

            <!-- Character + Persona -->
            <div class="vdb-info-grid">
              <div class="glass-card p-3" id="char-card">
                <div class="d-flex align-items-center gap-3 mb-3">
                  <div class="vdb-char-avatar-wrap">
                    <img id="char-avatar" class="vdb-char-avatar" src="" alt="" />
                    <div id="char-avatar-placeholder" class="vdb-char-placeholder d-none">
                      <i class="bi bi-person-fill"></i>
                    </div>
                  </div>
                  <div>
                    <div id="char-name" class="fw-bold" style="font-size:1.05rem;"></div>
                    <a id="char-link" href="#" class="text-info" style="font-size:.78rem;">
                      <i class="bi bi-box-arrow-up-right me-1"></i>Abrir chat
                    </a>
                  </div>
                </div>
                <div class="vdb-fields" id="char-fields"></div>
              </div>

              <div class="glass-card p-3" id="persona-card">
                <div class="d-flex align-items-center gap-2 mb-3">
                  <i class="bi bi-person-badge text-info"></i>
                  <span class="fw-semibold">Persona</span>
                </div>
                <div class="vdb-fields" id="persona-fields"></div>
              </div>
            </div>

            <!-- Messages -->
            <section class="vdb-section glass-card p-3">
              <div class="vdb-section-header">
                <div class="d-flex align-items-center gap-2">
                  <i class="bi bi-chat-left-dots text-info"></i>
                  <span class="fw-semibold">Mensagens</span>
                </div>
                <span id="msg-count" class="badge-count">0</span>
              </div>
              <div id="messages-container" class="vdb-messages"></div>
            </section>

            <!-- Memories -->
            <section class="vdb-section glass-card p-3">
              <div class="vdb-section-header mb-3">
                <div class="d-flex align-items-center gap-2">
                  <i class="bi bi-brain text-info"></i>
                  <span class="fw-semibold">Memórias</span>
                </div>
                <span id="mem-total" class="badge-count">0</span>
              </div>
              <div class="vdb-mem-tabs" id="mem-tabs">
                <button class="vdb-mem-tab active" data-type="pinned">
                  <i class="bi bi-pin-fill"></i> Fixadas <span id="count-pinned" class="tab-count">0</span>
                </button>
                <button class="vdb-mem-tab" data-type="auto">
                  <i class="bi bi-cpu"></i> Auto <span id="count-auto" class="tab-count">0</span>
                </button>
                <button class="vdb-mem-tab" data-type="manual">
                  <i class="bi bi-pencil-fill"></i> Manual <span id="count-manual" class="tab-count">0</span>
                </button>
              </div>
              <div id="memories-container"></div>
            </section>

          </div>
        </main>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/sidebar.js"></script>
    <script src="/assets/js/viewdb.js"></script>
  </body>
</html>
